spring:
  config:
    activate:
      on-profile: local

  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: localhost
      port: 6379

jwt:
  secret: "local-secret-key-must-be-at-least-256-bits-long-here!!"
  access-token-expiration: 900000
  refresh-token-expiration: 604800000